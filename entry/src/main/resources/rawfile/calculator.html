<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="./compute-engine.min.js"></script>
    <script src="./mathlive.min.js"></script>
    <style>
        :root {
            --bg-color: #F1F3F5;
            --text-color: #1A1C1E;
            --result-color: #494949;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #FFFFFF;
                --result-color: #e2e2e2;
            }
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            height: 100vh;
            margin: 0;
            padding: 48px 16px 20px 16px;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-touch-callout: none;
            background-color: var(--bg-color);
            transition: background-color 0.3s ease;
        }

        math-field {
            width: fit-content;
            max-width: 100%;
            min-width: 40px;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            --placeholder-color: var(--text-color);
            --placeholder-opacity: 0.35;
            transition: color 0.3s ease;

            /* 强制开启浏览器原生滑动 */
            touch-action: pan-x pan-y !important;
        }

        #math-input {
            margin-top: auto;
            font-size: 2.5rem;
        }

        #math-input:focus-within {
            outline: none;
        }

        #math-input::part(virtual-keyboard-toggle),
        #math-input::part(menu-toggle) {
            display: none;
        }

        #math-result {
            font-size: 2rem;
            color: var(--result-color);
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            text-align: right;
        }

        #math-result.show {
            opacity: 1;
        }
    </style>
</head>

<body>
<math-field id="math-input" math-virtual-keyboard-policy="manual"></math-field>
<math-field id="math-result" read-only></math-field>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const mf = document.getElementById('math-input');
        const resField = document.getElementById('math-result');

        mf.focus();

        window.showResult = function (latexString) {
            resField.value = latexString;
            resField.classList.add('show');
        };

        mf.addEventListener('input', () => {
            resField.classList.remove('show');
        });

        window.insertMath = function (latexString) {
            mf.executeCommand(['insert', latexString]);
            mf.focus();
        };

        window.clearMath = function () {
            mf.executeCommand('deleteAll');
            resField.classList.remove('show');
            resField.value = '';
            mf.focus();
        };

        window.deleteMath = function () {
            mf.executeCommand('deleteBackward');
            mf.focus();
        };

        window.getFormula = function () {
            return mf.value;
        };

        window.getMathJSON = function () {
            const jsonAST = mf.getValue('math-json');
            return JSON.stringify(jsonAST);
        };

        let isDragging = false;
        let startX = 0, startY = 0;

        window.addEventListener('pointerdown', (e) => {
            isDragging = false;
            startX = e.clientX;
            startY = e.clientY;
        }, { capture: true });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) {
                let dx = Math.abs(e.clientX - startX);
                let dy = Math.abs(e.clientY - startY);
                if (dx > 5 || dy > 5) {
                    isDragging = true;
                }
            }
            if (isDragging) {
                // 滑动屏幕，立刻拦截事件！
                e.stopPropagation();
            }
        }, { capture: true });

        // 禁用长按右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    });
</script>
</body>

</html>
