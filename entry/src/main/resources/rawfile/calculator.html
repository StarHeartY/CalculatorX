<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="./compute-engine.min.js"></script>
    <script src="./mathlive.min.js"></script>
    <style>
        /* 1. 定义色彩变量引擎 */
        :root {
            /* 浅色模式变量 (保持你原本的设计) */
            --bg-color: #F1F3F5;
            --text-color: #1A1C1E;
        }

        /* 🚀 新增：当系统切换到深色模式时，自动覆盖为深色变量 */
        @media (prefers-color-scheme: dark) {
            :root {
                /* 深色模式下，背景建议用极深灰或纯黑，文字用纯白 */
                --bg-color: #000000;
                --text-color: #FFFFFF;
            }
        }

        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 16px;
            /* 🚀 使用变量，并加上平滑的过渡动画，让切换主题时不那么生硬 */
            background-color: var(--bg-color);
            transition: background-color 0.3s ease;
        }

        math-field {
            font-size: 2.8rem;
            width: 100%;
            background-color: transparent;
            border: none;
            /* 🚀 字体和占位符颜色全部挂载到变量上 */
            color: var(--text-color);
            --placeholder-color: var(--text-color);
            --placeholder-opacity: 0.35;
            transition: color 0.3s ease;
        }

        math-field:focus-within {
            outline: none;
        }

        math-field::part(virtual-keyboard-toggle) {
            display: none;
        }

        math-field::part(menu-toggle) {
            display: none;
        }
    </style>
</head>

<body>
<math-field id="math-input" math-virtual-keyboard-policy="manual"></math-field>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const mf = document.getElementById('math-input');

        mf.focus();

        window.insertMath = function (latexString) {
            mf.executeCommand(['insert', latexString]);
            mf.focus();
        };

        window.clearMath = function () {
            mf.executeCommand('deleteAll');
            mf.focus();
        };

        window.deleteMath = function () {
            mf.executeCommand('deleteBackward');
            mf.focus();
        };

        window.getFormula = function () {
            return mf.value;
        };

        window.getMathJSON = function () {
            const jsonAST = mf.getValue('math-json');
            return JSON.stringify(jsonAST);
        };
    });
</script>
</body>

</html>
