<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="./compute-engine.min.js"></script>
    <script src="./mathlive.min.js"></script>
    <style>
        :root {
            --bg-color: #F1F3F5;
            --text-color: #1A1C1E;
            --result-color: #494949;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #FFFFFF;
                --result-color: #e2e2e2;
            }
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            height: 100vh;
            margin: 0;
            padding: 48px 16px 20px 16px;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-touch-callout: none;
            background-color: var(--bg-color);
            transition: background-color 0.3s ease;
        }

        math-field {
            width: fit-content;
            max-width: 100%;
            min-width: 40px;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            --placeholder-color: var(--text-color);
            --placeholder-opacity: 0.35;
            transition: color 0.3s ease;

        }

        #math-input {
            margin-top: auto;
            font-size: 2.5rem;
        }

        #math-input:focus-within {
            outline: none;
        }

        #math-input::part(virtual-keyboard-toggle),
        #math-input::part(menu-toggle) {
            display: none;
        }

        #math-result {
            font-size: 1.8rem;
            color: var(--result-color);
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            text-align: right;
        }

        #math-result.show {
            opacity: 1;
        }
    </style>
</head>

<body>
<math-field id="math-input" math-virtual-keyboard-policy="manual"></math-field>
<math-field id="math-result" read-only></math-field>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const mf = document.getElementById('math-input');
        const resField = document.getElementById('math-result');

        // 清空 MathLive 内置菜单项
        mf.menuItems = [];

        // 拦截浏览器原生的长按/右键菜单事件
        mf.addEventListener('contextmenu', function(event) {
            event.preventDefault();
            event.stopPropagation();
        });

        mf.focus();


        window.showResult = function (latexString) {
            resField.value = latexString;
            resField.classList.add('show');
        };

        mf.addEventListener('input', () => {
            resField.classList.remove('show');
        });

        window.insertMath = function (latexString) {
            const currentLatex = mf.value;
            // 正则判断当前公式最后是不是以“秒”结尾（兼容 MathLive 的空格排版）
            const isEndsWithSecond = /\^\{\\prime\s*\\prime\}\s*$/.test(currentLatex);

            // 【拦截逻辑】：如果前方是秒，并且当前传入的是纯数字 (0-9)
            if (isEndsWithSecond && /^[0-9]$/.test(latexString)) {
                return; // 直接返回，吞噬按键
            }

            mf.executeCommand(['insert', latexString]);
            mf.focus();
        };

        // 度分秒专属的智能插入与拦截
        window.insertDMS = function () {
            const currentLatex = mf.value;

            // 【拦截逻辑】：如果前方紧挨着已经是“秒”了，直接禁止再次输入度分秒
            const isEndsWithSecond = /\^\{\\prime\s*\\prime\}\s*$/.test(currentLatex);
            if (isEndsWithSecond) {
                return; // 直接返回，吞噬按键
            }

            // 查找最后一个出现的度、分、秒符号的索引
            const lastDegree = currentLatex.lastIndexOf('^{\\circ}');
            const lastMinute = currentLatex.lastIndexOf('^{\\prime}');
            const lastSecond1 = currentLatex.lastIndexOf('^{\\prime\\prime}');
            const lastSecond2 = currentLatex.lastIndexOf('^{\\prime \\prime}');
            const lastSecond = Math.max(lastSecond1, lastSecond2);

            const maxIndex = Math.max(lastDegree, lastMinute, lastSecond);

            let toInsert = '^{\\circ}'; // 默认状态：插入度 (°)

            if (maxIndex !== -1) {
                if (maxIndex === lastDegree) {
                    toInsert = '^{\\prime}';        // 紧挨着度：插入分 (')
                } else if (maxIndex === lastMinute) {
                    toInsert = '^{\\prime\\prime}'; // 紧挨着分：插入秒 (")
                } else if (maxIndex === lastSecond) {
                    // 因为上方已经拦截了紧挨着秒的情况，走到这里说明光标不在秒后面
                    // 比如 12°34'56" + 1，此时按下 DMS，开启新一轮的循环
                    toInsert = '^{\\circ}';
                }
            }

            mf.executeCommand(['insert', toInsert]);
            mf.focus();
        };

        window.clearMath = function () {
            mf.executeCommand('deleteAll');
            resField.classList.remove('show');
            resField.value = '';
            mf.focus();
        };

        window.deleteMath = function () {
            mf.executeCommand('deleteBackward');
            mf.focus();
        };

        window.getFormula = function () {
            return mf.value;
        };

        window.getMathJSON = function () {
            const jsonAST = mf.getValue('math-json');
            return JSON.stringify(jsonAST);
        };

        // 度分秒逻辑
        window.insertDMS = function () {
            const currentLatex = mf.value;

            // 查找最后一个出现的度、分、秒符号的索引
            const lastDegree = currentLatex.lastIndexOf('^{\\circ}');
            const lastMinute = currentLatex.lastIndexOf('^{\\prime}');

            // MathLive 内部对连续单引号的渲染可能有两种空格格式，做个兼容
            const lastSecond1 = currentLatex.lastIndexOf('^{\\prime\\prime}');
            const lastSecond2 = currentLatex.lastIndexOf('^{\\prime \\prime}');
            const lastSecond = Math.max(lastSecond1, lastSecond2);

            const maxIndex = Math.max(lastDegree, lastMinute, lastSecond);

            let toInsert = '^{\\circ}'; // 默认状态：插入度 (°)

            if (maxIndex !== -1) {
                if (maxIndex === lastDegree) {
                    toInsert = '^{\\prime}';        // 紧跟在度后面：插入分 (')
                } else if (maxIndex === lastMinute) {
                    toInsert = '^{\\prime\\prime}'; // 紧跟在分后面：插入秒 (")
                } else if (maxIndex === lastSecond) {
                    toInsert = '^{\\circ}';         // 紧跟在秒后面：开启下一个循环，插入度 (°)
                }
            }

            mf.executeCommand(['insert', toInsert]);
            mf.focus();
        };
    });
</script>
</body>

</html>
