<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script defer src="https://unpkg.com/mathlive"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 16px;
            background-color: #F1F3F5;
        }

        math-field {
            font-size: 2.8rem;
            width: 100%;
            background-color: transparent;
            border: none;
            color: #1A1C1E;
            --placeholder-color: #1A1C1E;
            --placeholder-opacity: 0.35;
        }

        math-field:focus-within {
            outline: none;
        }

        /* 隐藏虚拟键盘图标 */
        math-field::part(virtual-keyboard-toggle) {
            display: none;
        }

        /* 隐藏三条横杠 */
        math-field::part(menu-toggle) {
            display: none;
        }
    </style>
</head>
<body>
<math-field id="math-input" math-virtual-keyboard-policy="manual"></math-field>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const mf = document.getElementById('math-input');
        mf.focus();

        window.insertMath = function(latexString) {
            mf.executeCommand(['insert', latexString]);
            mf.focus();
        };

        window.clearMath = function() {
                latexString = latexString.replace(/\{\}/g, '{\\placeholder{}}');

    mf.executeCommand(['insert', latexString]);
    mf.focus();
        };

        // 核心新增：向 MathLive 发送“向后删除”的指令
        window.deleteMath = function() {
            mf.executeCommand('deleteBackward');
            mf.focus();
        };

        window.getFormula = function() {
            return mf.value;
        };
    });
</script>
</body>
</html>
